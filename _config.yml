title: Tennessee Digital Rights Tracker
description: Source-first explanations of Tennessee policies affecting privacy, surveillance, health data, online identity, and civil liberties.
url: "https://madebytommi.github.io"
baseurl: "/tennessee-digital-rights-tracker"
repository_url: "https://github.com/madebytommi/tennessee-digital-rights-tracker"
markdown: kramdown
permalink: pretty

collections:
  entries:
    output: true
    permalink: /entries/:name/

defaults:
  - scope:
      path: ""
      type: entries
    values:
      layout: entry

exclude:
  - scripts
  - schemas
  - templates
  - requirements-dev.txt
  - README.md
  - CONTRIBUTING.md
  - SECURITY.md
  - LICENSE
  - LICENSE-CONTENT.md
